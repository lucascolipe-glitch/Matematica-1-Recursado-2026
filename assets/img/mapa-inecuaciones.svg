<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="t d">
<title id="t">Mapa conceptual de inecuaciones</title><desc id="d">Comparar, representar, analizar signos e interpretar distancias se conectan alrededor de la recta real</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#dceaff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#17365f" flood-opacity=".12"/></filter></defs>
<rect width="100%" height="100%" rx="44" fill="url(#bg)"/><g font-family="Arial, sans-serif"><circle cx="450" cy="310" r="105" fill="#17365f"/><text x="450" y="300" text-anchor="middle" font-size="30" font-weight="700" fill="#fff">DECIDIR</text><text x="450" y="338" text-anchor="middle" font-size="22" fill="#dceaff">antes de calcular</text><path d="M450 310L180 185" stroke="#1f4e8c" stroke-width="5" opacity=".6"/><rect x="45" y="120" width="270" height="130" rx="26" fill="#fff" stroke="#1f4e8c" stroke-width="4" filter="url(#s)"/><text x="180" y="177" text-anchor="middle" font-size="25" font-weight="700" fill="#1f4e8c">COMPARAR</text><text x="180" y="215" text-anchor="middle" font-size="18" fill="#536273">monotonía · sentido</text><path d="M450 310L650 185" stroke="#147d64" stroke-width="5" opacity=".6"/><rect x="515" y="120" width="270" height="130" rx="26" fill="#fff" stroke="#147d64" stroke-width="4" filter="url(#s)"/><text x="650" y="177" text-anchor="middle" font-size="25" font-weight="700" fill="#147d64">REPRESENTAR</text><text x="650" y="215" text-anchor="middle" font-size="18" fill="#536273">intervalos · recta</text><path d="M450 310L180 430" stroke="#6d4fc2" stroke-width="5" opacity=".6"/><rect x="45" y="365" width="270" height="130" rx="26" fill="#fff" stroke="#6d4fc2" stroke-width="4" filter="url(#s)"/><text x="180" y="422" text-anchor="middle" font-size="25" font-weight="700" fill="#6d4fc2">ANALIZAR</text><text x="180" y="460" text-anchor="middle" font-size="18" fill="#536273">signos · condiciones</text><path d="M450 310L650 430" stroke="#c66a18" stroke-width="5" opacity=".6"/><rect x="515" y="365" width="270" height="130" rx="26" fill="#fff" stroke="#c66a18" stroke-width="4" filter="url(#s)"/><text x="650" y="422" text-anchor="middle" font-size="25" font-weight="700" fill="#c66a18">DISTANCIA</text><text x="650" y="460" text-anchor="middle" font-size="18" fill="#536273">valor absoluto</text></g></svg>
